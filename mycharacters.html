<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froggie AI - My Characters</title>
    <link rel="icon" href="ranita.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #FFFDF9;
            --bg-accent: #EBF29B;
            --text-dark: #3E532B;
            --btn-color: #5D7038;
            --btn-hover: #455329;
            --font-serif: 'Georgia', serif;
        }

        body.theme-dark {
            --bg-main: #483C25;
            --bg-accent: #372E1C;
            --text-dark: #9ea93f;
            --btn-color: #9ea93f;
            --btn-hover: #7E8732;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 80px;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--bg-accent);
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(62, 83, 43, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            text-decoration: none;
            color: var(--text-dark);
        }
        .brand img { width: 30px; height: auto; }

        .header-right { display: flex; align-items: center; gap: 18px; }
        .btn-logout { font-size: 0.9rem; text-decoration: none; color: var(--text-dark); opacity: 0.75; display: flex; align-items: center; gap: 5px; transition: opacity 0.2s; }
        .btn-logout:hover { opacity: 1; }
        .menu-trigger { background: none; border: none; cursor: pointer; color: var(--text-dark); display: flex; padding: 4px; }
        .icon-svg { width: 24px; height: 24px; fill: currentColor; }

        /* --- OVERLAY --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 150; display: none; }
        .overlay.show { display: block; }

        /* --- MENÚ LATERAL --- */
        .side-menu {
            position: fixed;
            top: 0; right: -320px;
            width: 290px;
            height: 100vh;
            background-color: var(--bg-main);
            border-left: 1px solid rgba(62, 83, 43, 0.18);
            box-shadow: -4px 0 20px rgba(0,0,0,0.08);
            z-index: 200;
            transition: right 0.3s ease;
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
        }
        .side-menu.open { right: 0; }

        .side-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(62, 83, 43, 0.25);
            padding-bottom: 14px;
        }
        .side-menu-header h3 { font-weight: normal; font-size: 1.25rem; }
        .btn-close-menu { background: none; border: none; cursor: pointer; color: var(--text-dark); }

        .menu-section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.45;
            padding: 0 10px;
            margin-top: 4px;
        }

        .menu-options { list-style: none; display: flex; flex-direction: column; gap: 4px; }

        .menu-btn {
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 1rem;
            font-family: var(--font-serif);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .menu-btn:hover { background-color: var(--bg-accent); }

        .appearance-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 10px;
            background-color: rgba(62, 83, 43, 0.03);
        }
        .appearance-dropdown.show { max-height: 280px; padding: 10px; margin-bottom: 6px; }

        .theme-sub-btn {
            background-color: var(--bg-main);
            color: var(--text-dark);
            border: 1px solid rgba(62, 83, 43, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-serif);
            font-size: 0.88rem;
            text-align: left;
            transition: background-color 0.2s;
        }
        .theme-sub-btn:hover { background-color: var(--btn-color); color: #fff; }

        .custom-picker-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.84rem;
            padding: 3px 4px;
        }
        .custom-picker-row input[type="color"] { border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; background: none; }

        .menu-divider { border: none; border-top: 1px dashed rgba(62, 83, 43, 0.18); margin: 4px 0; }

        /* --- MAIN CONTENT --- */
        main {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
            flex-grow: 1;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: normal;
            margin-bottom: 6px;
            opacity: 0.95;
        }

        .page-subtitle {
            font-size: 0.9rem;
            opacity: 0.55;
            margin-bottom: 25px;
            font-style: italic;
        }

        .chars-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .char-card {
            background-color: rgba(62, 83, 43, 0.03);
            border: 1px solid rgba(62, 83, 43, 0.08);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-decoration: none;
            color: var(--text-dark);
            transition: background-color 0.2s, border-color 0.2s;
        }
        .char-card:hover {
            background-color: rgba(62, 83, 43, 0.06);
            border-color: var(--btn-color);
        }

        .char-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .char-avatar {
            width: 42px; height: 42px;
            background-color: var(--bg-accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.95rem;
            border: 1px solid rgba(62, 83, 43, 0.1);
        }

        .char-info h4 { font-size: 1.05rem; font-weight: normal; }
        .char-info span { font-size: 0.88rem; opacity: 0.6; }
        .char-creator { font-size: 0.75rem; opacity: 0.38; margin-top: 1px; }

        .char-description {
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            opacity: 0.5;
            font-style: italic;
            font-size: 0.95rem;
        }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background-color: var(--bg-accent);
            border-top: 1px solid rgba(62, 83, 43, 0.18);
            display: flex; justify-content: space-around; padding: 10px 0 12px; z-index: 100;
        }

        .nav-link-btn {
            text-decoration: none; color: var(--text-dark); font-size: 0.82rem; display: flex; flex-direction: column;
            align-items: center; gap: 4px; opacity: 0.6; background: none; border: none; cursor: pointer; font-family: var(--font-serif); transition: opacity 0.2s; padding: 0 20px;
        }
        .nav-link-btn .icon-svg { width: 22px; height: 22px; }
        .nav-link-btn.active, .nav-link-btn:hover { opacity: 1; }
        .nav-link-btn.active span { font-weight: bold; }

        /* --- POPUP DE CREACIÓN --- */
        .create-popover {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            background-color: var(--bg-main);
            border: 1px solid rgba(62, 83, 43, 0.25);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            display: none;
            flex-direction: column;
            padding: 6px;
            z-index: 1000;
            width: 180px;
            opacity: 0;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .create-popover.show {
            display: flex;
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        .create-popover button {
            width: 100%;
            background: none;
            border: none;
            padding: 11px 14px;
            text-align: left;
            font-family: var(--font-serif);
            color: var(--text-dark);
            font-size: 0.92rem;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .create-popover button:hover {
            background-color: rgba(93, 112, 56, 0.12);
        }
    </style>
</head>

    <script>
        const SUPABASE_URL = "https://jqfbrrbewdtmhjsaifhi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_000Yr23ozkpp-ovO2a4S5Q_tTnj8bL8";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleMenu(event) {
            if(event) event.stopPropagation();
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            
            document.getElementById('createPopover').classList.remove('show');

            menu.classList.toggle('open');
            if (menu.classList.contains('open')) {
                overlay.classList.add('show');
            } else {
                overlay.classList.remove('show');
                document.getElementById('appearanceDropdown').classList.remove('show');
            }
        }

        function toggleCreateMenu(event) {
            event.stopPropagation();
            const popover = document.getElementById('createPopover');
            popover.classList.toggle('show');
        }

        function closeAllPanels() {
            document.getElementById('sideMenu').classList.remove('open');
            document.getElementById('createPopover').classList.remove('show');
            document.getElementById('menuOverlay').classList.remove('show');
            document.getElementById('appearanceDropdown').classList.remove('show');
        }

        document.addEventListener('click', function(event) {
            const popover = document.getElementById('createPopover');
            if (popover && popover.classList.contains('show')) {
                popover.classList.remove('show');
            }
        });

        function toggleAppearanceDropdown(event) {
            event.stopPropagation();
            document.getElementById('appearanceDropdown').classList.toggle('show');
        }

        function setTheme(name) {
            document.body.removeAttribute('style');
            document.body.classList.toggle('theme-dark', name === 'dark');
            localStorage.setItem('user-theme', name);
        }

        function applyCustomTheme() {
            document.body.classList.remove('theme-dark');
            const bg = document.getElementById('customBgInput').value;
            const txt = document.getElementById('customTextInput').value;
            
            document.body.style.setProperty('--bg-main', bg);
            document.body.style.setProperty('--text-dark', txt);
            document.body.style.setProperty('--btn-color', txt);
            document.body.style.setProperty('--bg-accent', adjustBrightness(bg, -12));
            
            localStorage.setItem('user-theme', 'custom');
            localStorage.setItem('custom-bg', bg);
            localStorage.setItem('custom-text', txt);
        }

        function adjustBrightness(hex, pct) {
            let n = parseInt(hex.replace('#',''), 16), a = Math.round(2.55 * pct);
            let R = (n >> 16) + a, G = (n >> 8 & 0xFF) + a, B = (n & 0xFF) + a;
            return '#' + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
        }

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await _supabase.auth.signOut();
                localStorage.removeItem('froggie_access_token');
                localStorage.removeItem('froggie_refresh_token');
                localStorage.removeItem('froggie_uid');
            window.location.href = 'index.html';
        });

        window.onload = async function() {
            // Sincronización estricta de la apariencia
            const saved = localStorage.getItem('user-theme');
            if (saved === 'dark') setTheme('dark');
            else if (saved === 'custom') {
                const bg = localStorage.getItem('custom-bg') || '#FFFDF9';
                const txt = localStorage.getItem('custom-text') || '#3E532B';
                document.getElementById('customBgInput').value = bg;
                document.getElementById('customTextInput').value = txt;
                applyCustomTheme();
            }

            // Restaurar sesion desde tokens guardados si existen
            const storedAccess = localStorage.getItem('froggie_access_token');
            const storedRefresh = localStorage.getItem('froggie_refresh_token');
            if (storedAccess && storedRefresh) {
                await _supabase.auth.setSession({
                    access_token: storedAccess,
                    refresh_token: storedRefresh
                });
            }

            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'registro.html'; return; }
            localStorage.setItem('froggie_uid', session.user.id);
            localStorage.setItem('froggie_access_token', session.access_token);
            localStorage.setItem('froggie_refresh_token', session.refresh_token);
            fetchMyCharacters(session.user.id);
        }

        async function fetchMyCharacters(userId) {
            const container = document.getElementById('charactersContainer');
            try {
                const { data: characters, error } = await _supabase
                    .from('characters')
                    .select('id, name, subtitle, photo_url, visibility')
                    .eq('creator_id', userId)
                    .order('created_at', { ascending: false });

                if (error || !characters || characters.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            You haven't written any characters yet.<br>
                            Click on the <b>Create</b> button to breathe life into your first creation.
                        </div>`;
                    return;
                }

                // Fetch username
                let username = '';
                const { data: profile } = await _supabase
                    .from('profiles')
                    .select('username')
                    .eq('id', userId)
                    .single();
                if (profile) username = profile.username;

                container.innerHTML = '';
                characters.forEach(char => {
                    const avatarStyle = char.photo_url
                        ? `style="background-image:url('${char.photo_url}');background-size:cover;background-position:center;"`
                        : '';
                    const avatarContent = char.photo_url ? '' : char.name.substring(0,2).toUpperCase();
                    const visibilityBadge = char.visibility === 'private'
                        ? `<span style="font-size:0.7rem;opacity:0.45;margin-left:6px;">🔒 Private</span>`
                        : '';
                    const creatorHtml = username ? `<p class="char-creator">@${username}</p>` : '';
                    container.innerHTML += `
                        <a href="room.html?id=${char.id}" class="char-card">
                            <div class="char-card-header">
                                <div class="char-avatar" ${avatarStyle}>${avatarContent}</div>
                                <div class="char-info">
                                    <h4>${char.name}${visibilityBadge}</h4>
                                    <span>${char.subtitle || 'Character'}</span>
                                    ${creatorHtml}
                                </div>
                            </div>
                        </a>`;
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="empty-state" style="color: red;">Failed to retrieve your characters. Check database connection.</p>`;
            }
        }
    </script>
</body>
</html>
