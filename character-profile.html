<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froggie AI - Character Profile</title>
    <link rel="icon" href="ranita.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #FFFDF9;
            --bg-accent: #EBF29B;
            --text-dark: #3E532B;
            --btn-color: #5D7038;
            --btn-hover: #455329;
            --border: rgba(62, 83, 43, 0.15);
            --font-serif: 'Georgia', serif;
        }

        body.theme-dark {
            --bg-main: #483C25;
            --bg-accent: #372E1C;
            --text-dark: #9ea93f;
            --btn-color: #9ea93f;
            --btn-hover: #7E8732;
            --border: rgba(158, 169, 63, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }

        .btn-back {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            padding: 6px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        .btn-back:hover { background-color: rgba(62, 83, 43, 0.08); }

        .container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* --- TARJETA PRINCIPAL DEL BOT --- */
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--bg-accent);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            background-size: cover;
            background-position: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }

        .profile-info h2 {
            font-size: 1.8rem;
            font-weight: normal;
            margin-bottom: 4px;
        }
        .profile-info p {
            font-size: 0.95rem;
            opacity: 0.6;
            font-style: italic;
            margin-bottom: 6px;
        }
        .profile-creator {
            font-size: 0.88rem;
            opacity: 0.8;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
        }
        .profile-creator:hover { color: var(--btn-color); }

        /* --- BOTONES DE ACCIÓN --- */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            width: 100%;
        }

        .btn-main {
            background-color: var(--btn-color);
            color: var(--bg-main);
            border: none;
            padding: 10px 24px;
            font-family: var(--font-serif);
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-main:hover { background-color: var(--btn-hover); }
        .btn-main:active { transform: scale(0.96); }

        .btn-outline {
            background: none;
            border: 1px solid var(--btn-color);
            color: var(--text-dark);
            padding: 10px 18px;
            font-family: var(--font-serif);
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s;
        }
        .btn-outline:hover { background-color: rgba(93, 112, 56, 0.08); }
        .btn-outline.active { color: #cc4b4b; border-color: #cc4b4b; background-color: rgba(204, 75, 75, 0.05); }

        .icon-svg { width: 20px; height: 20px; fill: currentColor; }

        /* --- DESCRIPCIÓN NARRATIVA --- */
        .section-box {
            border-top: 1px dashed var(--border);
            padding-top: 20px;
        }
        .section-box h3 {
            font-size: 1.15rem;
            font-weight: normal;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        .description-text {
            font-size: 1.05rem;
            line-height: 1.6;
            white-space: pre-wrap;
            opacity: 0.9;
        }

        /* --- SECCIÓN DE COMENTARIOS --- */
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .comment-form textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background-color: rgba(62, 83, 43, 0.02);
            color: var(--text-dark);
            font-family: var(--font-serif);
            font-size: 0.95rem;
            outline: none;
            resize: none;
        }
        .comment-form textarea:focus { border-color: var(--btn-color); }
        .comment-form button { align-self: flex-end; }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .comment-item {
            background-color: rgba(62, 83, 43, 0.03);
            padding: 12px 16px;
            border-radius: 12px;
            border-left: 3px solid var(--btn-color);
        }
        .comment-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 6px;
        }
        .comment-user { font-weight: bold; cursor: pointer; }
        .comment-user:hover { text-decoration: underline; }
        .comment-content { font-size: 0.95rem; line-height: 1.4; }
        .empty-comments { text-align: center; font-style: italic; opacity: 0.5; font-size: 0.9rem; padding: 20px; }
    </style>
</head>
<body>

    <header>
        <button class="btn-back" onclick="goBack()">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <span style="font-size: 0.9rem; opacity: 0.7;">Character Info</span>
    </header>

    <main class="container">
        <section class="profile-card">
            <div class="profile-avatar" id="botAvatar">--</div>
            <div class="profile-info">
                <h2 id="botName">Loading...</h2>
                <p id="botSubtitle">...</p>
                <span class="profile-creator" id="botCreator" onclick="goToCreator()">By @...</span>
            </div>

            <div class="action-bar">
                <button class="btn-main" onclick="startChat()">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
                    Chat
                </button>
                <button class="btn-outline" id="likeBtn" onclick="toggleLike()">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span id="likeTxt">fav</span>
                </button>
                <button class="btn-outline" onclick="copyBotLink()">
                    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    Share
                </button>
            </div>
        </section>

        <section class="section-box">
            <h3>Background & Personality</h3>
            <p class="description-text" id="botDescription">Loading character context...</p>
        </section>

        <section class="section-box">
            <h3>Community Reviews</h3>
            <div class="comment-form">
                <textarea id="newCommentInput" placeholder="Share your experience writing with this character..."></textarea>
                <button class="btn-main" onclick="postComment()">Post Review</button>
            </div>
            <div class="comments-list" id="commentsContainer">
                <div class="empty-comments">No reviews yet. Be the first to leave a mark!</div>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://jqfbrrbewdtmhjsaifhi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_000Yr23ozkpp-ovO2a4S5Q_tTnj8bL8";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUserId = "";
        let characterId = "";
        let botCreatorId = "";
        let isLiked = false;

        window.onload = async function() {
            // Aplicar tema — oscuro Y colores personalizados
            const savedTheme = localStorage.getItem('user-theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('theme-dark');
            } else if (savedTheme === 'custom') {
                const bg  = localStorage.getItem('custom-bg')   || '#FFFDF9';
                const txt = localStorage.getItem('custom-text') || '#3E532B';
                document.body.style.setProperty('--bg-main',    bg);
                document.body.style.setProperty('--text-dark',  txt);
                document.body.style.setProperty('--btn-color',  txt);
                document.body.style.setProperty('--btn-hover',  txt);
                document.body.style.setProperty('--border', 'rgba(62, 83, 43, 0.15)');
            }

            const params = new URLSearchParams(window.location.search);
            characterId = params.get('id');

            const storedAccess = localStorage.getItem('froggie_access_token');
            const storedRefresh = localStorage.getItem('froggie_refresh_token');
            if (storedAccess && storedRefresh) {
                await _supabase.auth.setSession({
                    access_token: storedAccess,
                    refresh_token: storedRefresh
                });
            }

            const { data: { session } } = await _supabase.auth.getSession();
            if (session) currentUserId = session.user.id;

            if (!characterId) {
                alert("No character specified.");
                window.location.href = 'dashboard.html';
                return;
            }

            await loadCharacterProfile();
            await checkLikeStatus();
            await loadComments();
        }

        // 1. Cargar metadatos públicos del bot
        async function loadCharacterProfile() {
            try {
                const { data: char, error } = await _supabase
                    .from('characters')
                    .select('*')
                    .eq('id', characterId)
                    .single();

                if (error || !char) throw new Error("Bot not found");

                botCreatorId = char.creator_id;
                document.getElementById('botName').textContent = char.name;
                document.getElementById('botSubtitle').textContent = char.subtitle || "Fictional Archetype";
                document.getElementById('botDescription').textContent = char.description || "No context provided.";

                // Cargar imagen o iniciales
                const avatar = document.getElementById('botAvatar');
                if (char.photo_url) {
                    avatar.style.backgroundImage = `url('${char.photo_url}')`;
                    avatar.textContent = "";
                } else {
                    avatar.textContent = char.name.substring(0, 2).toUpperCase();
                }

                // Cargar username del autor desde tu tabla 'profiles'
                if (char.creator_id) {
                    const { data: profileData } = await _supabase
                        .from('profiles') 
                        .select('username')
                        .eq('id', char.creator_id)
                        .single();

                    const username = (profileData && profileData.username) ? profileData.username : "creator";
                    document.getElementById('botCreator').textContent = `By @${username}`;
                }

            } catch (err) {
                console.error(err);
                document.getElementById('botName').textContent = "Unknown Identity";
            }
        }

        // 2. Verificar si el usuario ya le dio Like (Usa tu tabla 'favorites')
        async function checkLikeStatus() {
            if (!currentUserId) return;
            try {
                const { data, error } = await _supabase
                    .from('favorites')
                    .select('*')
                    .eq('character_id', characterId)
                    .eq('user_id', currentUserId)
                    .single();

                if (data && !error) {
                    isLiked = true;
                    document.getElementById('likeBtn').classList.add('active');
                    document.getElementById('likeTxt').textContent = "Liked";
                }
            } catch (e) {}
        }

        // 3. Alternar el estado de favoritos/like
        async function toggleLike() {
            if (!currentUserId) {
                alert("Please log in to bookmark characters.");
                return;
            }

            isLiked = !isLiked;
            const btn = document.getElementById('likeBtn');
            const txt = document.getElementById('likeTxt');

            if (isLiked) {
                btn.classList.add('active');
                txt.textContent = "Liked";
                await _supabase.from('favorites').insert([{ character_id: characterId, user_id: currentUserId }]);
            } else {
                btn.classList.remove('active');
                txt.textContent = "Like";
                await _supabase.from('favorites').delete().eq('character_id', characterId).eq('user_id', currentUserId);
            }
        }

        // 4. Copiar link limpio del bot al portapapeles sin mezclar conversaciones
        function copyBotLink() {
            // Genera la URL base apuntando al molde del bot
            const botURL = `${window.location.origin}${window.location.pathname}?id=${characterId}`;
            navigator.clipboard.writeText(botURL)
                .then(() => alert("Character link copied to clipboard! Share it anywhere."))
                .catch(() => alert("Failed to copy link automatically."));
        }

        // 5. Enviar directo a la sala de chat individual
        function startChat() {
            window.location.href = `room.html?id=${characterId}`;
        }

        // 6. Viajar al perfil del creador
        function goToCreator() {
            if (botCreatorId) {
                window.location.href = `user-profile.html?id=${botCreatorId}&from=character-profile`;
            }
        }

        // --- SISTEMA DE COMENTARIOS REAL (Tabla opcional 'comments') ---
        async function loadComments() {
            const container = document.getElementById('commentsContainer');
            try {
                // Hacemos el select de comentarios vinculados a este bot
                const { data: comments, error } = await _supabase
                    .from('comments') // Nota: Asegúrate de crear esta tabla en Supabase (id, character_id, user_id, username, content, created_at)
                    .select('*')
                    .eq('character_id', characterId)
                    .order('created_at', { ascending: false });

                if (error || !comments || comments.length === 0) {
                    container.innerHTML = `<div class="empty-comments">No reviews yet. Be the first to leave a mark!</div>`;
                    return;
                }

                container.innerHTML = '';
                comments.forEach(c => {
                    const date = new Date(c.created_at).toLocaleDateString();
                    container.innerHTML += `
                        <div class="comment-item">
                            <div class="comment-meta">
                                <span class="comment-user" onclick="window.location.href='user-profile.html?id=${c.user_id}&from=character-profile'">@${c.username || 'anonymous'}</span>
                                <span>${date}</span>
                            </div>
                            <p class="comment-content">${escapeHTML(c.content)}</p>
                        </div>`;
                });
            } catch (err) {
                // Fallback silencioso si el usuario aún no crea la tabla 'comments' en Supabase
                container.innerHTML = `<div class="empty-comments">Review wall is ready. Setup 'comments' table in Supabase to sync.</div>`;
            }
        }

        async function postComment() {
            if (!currentUserId) {
                alert("You must be logged in to post reviews.");
                return;
            }

            const input = document.getElementById('newCommentInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                // Obtener el username actual de quien comenta
                const { data: prof } = await _supabase.from('profiles').select('username').eq('id', currentUserId).single();
                const myUsername = (prof && prof.username) ? prof.username : "user";

                await _supabase.from('comments').insert([{
                    character_id: characterId,
                    user_id: currentUserId,
                    username: myUsername,
                    content: text,
                    created_at: new Date().toISOString()
                }]);

                input.value = '';
                await loadComments();

            } catch (err) {
                console.error(err);
                alert("Could not post review. Ensure your 'comments' table exists.");
            }
        }

        function goBack() {
            const from = new URLSearchParams(window.location.search).get('from');
            if (from === 'room') {
                window.location.href = `room.html?id=${characterId}`;
            } else if (from === 'favorites') {
                window.location.href = 'favorites.html';
            } else if (from === 'mycharacters') {
                window.location.href = 'mycharacters.html';
            } else if (from === 'user-profile') {
                history.back();
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        function escapeHTML(str) { return str.replace(/[&<>']/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;' }[t] || t)); }
    </script>
</body>
</html>
