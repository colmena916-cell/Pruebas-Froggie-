<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Froggie AI - Reset Password</title>
    <link rel="icon" href="ranita.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #EBF29B;
            --text-dark: #3E532B;
            --btn-color: #5D7038;
            --btn-hover: #455329;
            --card-bg: #FFFDF9;
            --font-serif: 'Georgia', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: var(--font-serif);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(62, 83, 43, 0.25);
            border-radius: 14px;
            padding: 40px 35px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
            text-align: center;
        }

        .frog-logo {
            width: 48px;
            height: auto;
            margin-bottom: 12px;
        }

        .auth-card h2 {
            font-size: 1.9rem;
            font-weight: normal;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .auth-card .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 28px;
            font-style: italic;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group { text-align: left; }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 6px;
            opacity: 0.85;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding: 11px 42px 11px 14px;
            border: 1px solid rgba(62, 83, 43, 0.35);
            border-radius: 7px;
            background-color: var(--card-bg);
            color: var(--text-dark);
            font-family: var(--font-serif);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .password-wrapper input:focus {
            border-color: var(--btn-color);
            box-shadow: 0 0 0 3px rgba(93, 112, 56, 0.12);
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            color: var(--text-dark);
            opacity: 0.45;
            transition: opacity 0.2s;
        }

        .toggle-pw:hover { opacity: 0.85; }

        .toggle-pw svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-submit {
            background-color: var(--btn-color);
            color: #fff;
            border: none;
            width: 100%;
            padding: 13px;
            font-family: var(--font-serif);
            font-size: 1.05rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit:hover { background-color: var(--btn-hover); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .form-message {
            font-size: 0.88rem;
            padding: 10px 14px;
            border-radius: 6px;
            display: none;
            text-align: left;
        }

        .form-message.error {
            display: block;
            background-color: rgba(180, 60, 60, 0.08);
            border: 1px solid rgba(180, 60, 60, 0.3);
            color: #8b2e2e;
        }

        .form-message.success {
            display: block;
            background-color: rgba(62, 83, 43, 0.08);
            border: 1px solid rgba(62, 83, 43, 0.3);
            color: var(--btn-color);
        }

        /* Estado de token inválido / expirado */
        .invalid-state {
            display: none;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .invalid-state p {
            font-size: 0.95rem;
            opacity: 0.8;
            line-height: 1.5;
        }

        .back-link {
            display: inline-block;
            margin-top: 22px;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .back-link:hover { opacity: 1; }

        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 18px;
                border: none;
                background-color: transparent;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <img src="ranita.png" alt="Froggie Logo" class="frog-logo">
        <h2>New Password</h2>
        <p class="subtitle">Choose something you won't forget this time.</p>

        <!-- Formulario principal -->
        <form class="auth-form" id="resetForm" onsubmit="handleReset(event)">
            <div class="form-message" id="resetMsg"></div>

            <div class="form-group">
                <label for="new-password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" placeholder="••••••••" required minlength="6">
                    <button type="button" class="toggle-pw" onclick="toggleVisibility('new-password', this)" aria-label="Show password">
                        <!-- Ojo abierto -->
                        <svg id="icon-new-password-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <!-- Ojo cerrado (oculto por defecto) -->
                        <svg id="icon-new-password-closed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6">
                    <button type="button" class="toggle-pw" onclick="toggleVisibility('confirm-password', this)" aria-label="Show password">
                        <svg id="icon-confirm-password-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="icon-confirm-password-closed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="resetBtn">Update Password</button>
        </form>

        <!-- Estado de enlace inválido/expirado -->
        <div class="invalid-state" id="invalidState">
            <p>This link has expired or is invalid. Please request a new one from the login page.</p>
            <a href="registro.html" class="btn-submit" style="text-decoration:none; display:inline-block; text-align:center;">Back to Log In</a>
        </div>

        <a href="registro.html" class="back-link" id="backLink">← Return to log in</a>
    </div>

    <script>
        const SUPABASE_URL = "https://jqfbrrbewdtmhjsaifhi.supabase.co";
        const SUPABASE_KEY = "sb_publishable_000Yr23ozkpp-ovO2a4S5Q_tTnj8bL8";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Supabase redirige con el token en el hash de la URL (#access_token=...&type=recovery)
        // El SDK lo procesa automáticamente al detectar el evento PASSWORD_RECOVERY
        let sessionReady = false;

        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                // Token válido: el SDK ya tiene la sesión lista para updateUser
                sessionReady = true;
            }
        });

        // Pequeña espera para que el SDK procese el hash antes de validar
        setTimeout(() => {
            const hash = window.location.hash;
            // Si no hay hash y no se detectó sesión de recovery, puede ser acceso directo
            // Solo mostramos error si alguien llega sin ningún token
            if (!hash.includes('access_token') && !hash.includes('type=recovery') && !sessionReady) {
                // Acceso directo sin token — mostrar estado inválido
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('backLink').style.display = 'none';
                document.getElementById('invalidState').style.display = 'flex';
            }
        }, 500);

        function toggleVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            document.getElementById(`icon-${inputId}-open`).style.display = isHidden ? 'none' : 'block';
            document.getElementById(`icon-${inputId}-closed`).style.display = isHidden ? 'block' : 'none';
            btn.style.opacity = isHidden ? '0.85' : '0.45';
        }

        function showMsg(text, type) {
            const el = document.getElementById('resetMsg');
            el.textContent = text;
            el.className = `form-message ${type}`;
            el.style.display = 'block';
        }

        async function handleReset(e) {
            e.preventDefault();
            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;
            const btn = document.getElementById('resetBtn');

            if (newPw !== confirmPw) {
                showMsg("Passwords don't match. Please try again.", 'error');
                return;
            }

            if (newPw.length < 6) {
                showMsg("Password must be at least 6 characters.", 'error');
                return;
            }

            btn.textContent = 'Updating...';
            btn.disabled = true;

            const { error } = await _supabase.auth.updateUser({ password: newPw });

            if (error) {
                showMsg(error.message.includes('expired') || error.message.includes('invalid')
                    ? 'This link has expired. Please request a new password reset.'
                    : 'Something went wrong. Please try again.',
                    'error'
                );
                btn.textContent = 'Update Password';
                btn.disabled = false;
            } else {
                showMsg('Password updated successfully! Redirecting to log in...', 'success');
                // Cerrar sesión de recovery para que haga login limpio
                await _supabase.auth.signOut();
                setTimeout(() => window.location.href = 'registro.html', 1800);
            }
        }
    </script>
</body>
</html>
